name: CI - AnotationBlog

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: annotation_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov ruff
        
    - name: Run Lint (Ruff)
      run: ruff check .
      
    - name: Security Audit
      run: pip install pip-audit && pip-audit || echo "Security issues found"

    - name: Run tests with pytest
      run: pytest --cov=app tests/
      env:
        DATABASE_URL: postgresql://user:password@localhost/annotation_db

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      
    - name: Run Type Check
      run: npm run build
      
    - name: Run Lint
      run: npm run lint

    - name: Run Unit Tests
      run: npm test

    - name: Security Audit
      run: npm audit || echo "Security issues found"
